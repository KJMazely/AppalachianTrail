<!DOCTYPE html>
<html>

<head>
    <title>Appalachian Trail Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #8b5a2b;
            /* rustic base */
            font-family: "Trebuchet MS", sans-serif;
        }

        #main-content {
            display: flex;
            flex-direction: row;
            min-height: 100vh;
            padding: 10px;
            box-sizing: border-box;
            gap: 10px;
        }

        /* Shared 3D rustic container style */
        .panel {
            background-color: #c19a6b;
            /* warm wood */
            padding: 15px;
            box-sizing: border-box;

            border-top: 5px solid #f5deb3;
            /* highlight */
            border-left: 5px solid #e0c097;
            border-bottom: 5px solid #5c4033;
            /* shadow */
            border-right: 5px solid #3e2723;

            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.4);
        }

        #LeftDiv {
            width: 25%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 20px;
        }

        #GameDiv {
            width: 50%;
        }

        #RightDiv {
            width: 25%;
        }

        h1,
        h2,
        h3 {
            color: #3e2723;
            margin-top: 0;
        }

        p {
            color: #4e342e;
        }

        button {
            background-color: #6d4c41;
            color: #fff8e1;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        button:hover {
            background-color: #5d4037;
        }

        iframe {
            width: 100%;
            height: 85vh;
            border: none;
        }

        .tutorial-box {
            background-color: #d2b48c;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div id="main-content">

        <!-- LEFT PANEL -->
        <div id="LeftDiv" class="panel">
            <h2>Appalachian Trail Game</h2>

            <button onclick="window.location.href='/logout';">Logout</button>

            <div class="tutorial-box">
                <h3>Quick Tutorial</h3>
                <p>
                    • Use arrow keys or WASD to move. Click to shoot.<br>
                    • Try to survive and get the highest score possible.<br>
                    • You can only shoot in the direction your waggon is facing.<br>
                    • Compete for the top of the leaderboard!
                </p>
            </div>
        </div>

        <!-- GAME PANEL -->
        <div id="GameDiv" class="panel">

        </div>

        <!-- RIGHT PANEL -->
        <div id="RightDiv" class="panel">
            <h2>LeaderBoard</h2>
            <hr>
            <p id="current-user-standing"></p>
            <hr>
            <span id="leaderboard-entries">

            </span>
        </div>

    </div>
</body>

</html>
<script>
    let currentUser = null;

    async function loadCurrentUser() {
        const res = await fetch('/api/me/');
        currentUser = await res.json();
        console.log("Loaded user:", currentUser);
    }

    async function createIframe() {
        if (!currentUser) {
            console.error("User not loaded yet");
            return;
        }

        const container = document.getElementById('GameDiv');
        const iframe = document.createElement('iframe');

        iframe.src = `/static/GameFiles/apptrail.html?username=${currentUser.username}&highscore=${currentUser.score}&userId=${currentUser.id}&name=${currentUser.username}&cookie=${document.cookie}`;

        container.appendChild(iframe);
    }

    async function populateLeaderboard() {
        if (!currentUser) {
            console.error("User not loaded yet");
            return;
        }

        const response = await fetch('/api/users');
        const users = await response.json();

        // Sort users by score (descending)
        users.sort((a, b) => b.score - a.score);

        const currentUserStanding = document.getElementById('current-user-standing');

        const currentUserData = users.find(
            user => user.username === currentUser.username
        );

        if (currentUserData) {
            const rank = users.indexOf(currentUserData) + 1;
            currentUserStanding.textContent =
                `${rank}. ${currentUserData.username} - Score: ${currentUserData.score}`;
        } else {
            currentUserStanding.textContent = 'Your Standing: Not ranked yet';
        }

        const leaderboardEntries = document.getElementById('leaderboard-entries');
        leaderboardEntries.innerHTML = '';

        users.forEach((user, index) => {
            const entry = document.createElement('p');
            entry.textContent = `${index + 1}. ${user.username} - Score: ${user.score}`;
            leaderboardEntries.appendChild(entry);
        });
    }

    async function init() {
        await loadCurrentUser();
        await createIframe();
        await populateLeaderboard();
    }

    const intervalId = setInterval(() => {
        populateLeaderboard();
    }, 5000);

    // Run everything in correct order
    window.addEventListener('load', init);
</script>
