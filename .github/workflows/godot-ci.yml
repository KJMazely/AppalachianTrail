name: Godot CI

on:
  push:
    branches:
      - GameDev
  pull_request:

permissions:
  contents: read

env:
  GODOT_VERSION: 4.6-stable

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  headless-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: Godot/appalachian-trail-game

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Cache Godot editor
        id: cache-godot
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/godot
          key: godot-${{ env.GODOT_VERSION }}-linux-x86_64

      - name: Download and setup Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${{ runner.temp }}/godot"
          curl -L --fail --show-error -o "${{ runner.temp }}/godot/godot.zip" \
            "https://github.com/godotengine/godot-builds/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_linux.x86_64.zip"
          
          unzip -qo "${{ runner.temp }}/godot/godot.zip" -d "${{ runner.temp }}/godot"
          rm "${{ runner.temp }}/godot/godot.zip"
          
          mv "${{ runner.temp }}/godot/Godot_v${{ env.GODOT_VERSION }}_linux.x86_64" "${{ runner.temp }}/godot/godot"
          chmod +x "${{ runner.temp }}/godot/godot"

      - name: Add Godot to PATH
        run: echo "${{ runner.temp }}/godot" >> $GITHUB_PATH

      - name: Cache Godot imported assets
        uses: actions/cache@v5
        with:
          path: Godot/appalachian-trail-game/.godot/imported
          key: godot-imported-${{ hashFiles('Godot/appalachian-trail-game/project.godot', 'Godot/appalachian-trail-game/**/*.gd', 'Godot/appalachian-trail-game/**/*.tscn', 'Godot/appalachian-trail-game/**/*.tres', 'Godot/appalachian-trail-game/**/*.res') }}

      - name: Import project assets
        run: godot --headless --import --quit

      - name: Run headless regression tests
        run: godot --headless --script res://tests/test_runner.gd 2>&1 | tee ci-test.log

      - name: Upload Godot test log on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: godot-ci-log
          path: Godot/appalachian-trail-game/ci-test.log