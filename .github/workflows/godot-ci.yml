name: Godot CI

on:
  push:
    branches: [GameDev]
  pull_request:
    branches: [GameDev]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      GODOT_VERSION: 4.6-stable
      GODOT_ZIP: Godot_v4.6-stable_linux.x86_64.zip
      GODOT_BIN: godot

    steps:
      - uses: actions/checkout@v5

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.GODOT_BIN }}
            ${{ env.GODOT_ZIP }}
          key: godot-${{ env.GODOT_VERSION }}

      - name: Download Godot (if not cached)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${GODOT_ZIP}
          unzip ${GODOT_ZIP}
          mv Godot_v4.6-stable_linux.x86_64 ${GODOT_BIN}
          chmod +x ${GODOT_BIN}

      - name: Ensure executable (cache case)
        if: steps.cache-godot.outputs.cache-hit == 'true'
        run: chmod +x ${GODOT_BIN}

      - name: Run tests
        run: ./${GODOT_BIN} --headless --verbose --path . -s res://tests/test_runner.gd --quit