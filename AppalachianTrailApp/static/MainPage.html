<!DOCTYPE html>
<html>
<head>
    <title>Appalachian Trail Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #8b5a2b; /* rustic base */
            font-family: "Trebuchet MS", sans-serif;
        }

        #main-content {
            display: flex;
            flex-direction: row;
            min-height: 100vh;
            padding: 10px;
            box-sizing: border-box;
            gap: 10px;
        }

        /* Shared 3D rustic container style */
        .panel {
            background-color: #c19a6b; /* warm wood */
            padding: 15px;
            box-sizing: border-box;

            border-top: 5px solid #f5deb3;      /* highlight */
            border-left: 5px solid #e0c097;
            border-bottom: 5px solid #5c4033;   /* shadow */
            border-right: 5px solid #3e2723;

            box-shadow: 6px 6px 12px rgba(0,0,0,0.4);
        }

        #LeftDiv {
            width: 25%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 20px;
        }

        #GameDiv {
            width: 50%;
        }

        #RightDiv {
            width: 25%;
        }

        h1, h2, h3 {
            color: #3e2723;
            margin-top: 0;
        }

        p {
            color: #4e342e;
        }

        button {
            background-color: #6d4c41;
            color: #fff8e1;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        button:hover {
            background-color: #5d4037;
        }

        iframe {
            width: 100%;
            height: 85vh;
            border: none;
        }

        .tutorial-box {
            background-color: #d2b48c;
            padding: 10px;
            border-radius: 5px;
        }

    </style>
</head>

<body>
    <div id="main-content">

        <!-- LEFT PANEL -->
        <div id="LeftDiv" class="panel">
            <h2>Appalachian Trail Game</h2>

            <button onclick="window.location.href='/';">Logout</button>

            <div class="tutorial-box">
                <h3>Quick Tutorial</h3>
                <p>
                    • Manage your supplies wisely.<br>
                    • Watch your stamina and hunger.<br>
                    • Random events can help or hurt you.<br>
                    • Reach the end of the trail to win!
                </p>
            </div>
        </div>

        <!-- GAME PANEL -->
        <div id="GameDiv" class="panel">
            <iframe src="/static/GameFiles/apptrail.html"></iframe>
        </div>

        <!-- RIGHT PANEL -->
        <div id="RightDiv" class="panel">
            <h2>LeaderBoard</h2>
            <p>🏔 Top Hikers:</p>
            <p>1. TrailMaster92</p>
            <p>2. SmokyMtnKing</p>
            <p>3. RidgeRunner</p>
        </div>

    </div>
</body>
</html>
